---
- name: (Deprecation) Catch and report renamed settings
  ansible.builtin.fail:
    msg: >-
      Your configuration contains a variable, which now has a different name.
      Please change your configuration to rename the variable (`{{ item.old }}` -> `{{ item.new }}`).
  when: "lookup('ansible.builtin.varnames', ('^' + item.old + '$'), wantlist=True) | length > 0"
  with_items:
    - { "old": "freescout_database_hostname", "new": "<Replace with freescout_database_mysql_hostname or freescout_database_postgres_hostname>" }
    - { "old": "freescout_database_port", "new": "<Replace with freescout_database_mysql_port or freescout_database_postgres_port>" }
    - { "old": "freescout_database_username", "new": "<Replace with freescout_database_mysql_username or freescout_database_postgres_username>" }
    - { "old": "freescout_database_password", "new": "<Replace with freescout_database_mysql_password or freescout_database_postgres_password>" }
    - { "old": "freescout_database_pgsql_ssl_mode", "new": "freescout_database_postgres_sslmode" }
    - { "old": "freescout_admin_email", "new": "freescout_environment_variables_admin_email" }
    - { "old": "freescout_admin_password", "new": "freescout_environment_variables_admin_password" }
    - { "old": "freescout_application_name", "new": "freescout_environment_variables_application_name" }
    - { "old": "freescout_display_errors", "new": "freescout_environment_variables_display_errors" }
    - { "old": "freescout_enable_auto_update", "new": "freescout_environment_variables_enable_auto_update" }
    - { "old": "freescout_http_header_content_permission_policy", "new": "freescout_http_header_permissions_policy" }
    - { "old": "freescout_container_image_force_pull", "new": "<removed> (the new community.docker.docker_image_pull module handles this natively)" }

- name: Fail if required FreeScout settings not defined
  ansible.builtin.fail:
    msg: >-
      You need to define a required configuration setting (`{{ item }}`).
  when: "lookup('vars', item, default='') | string | length == 0"
  with_items:
    - freescout_uid
    - freescout_gid
    - freescout_hostname
    - freescout_path_prefix
    - freescout_container_network
    - freescout_environment_variables_admin_email
    - freescout_environment_variables_admin_password

- name: Fail if FreeScout database type invalid
  ansible.builtin.fail:
    msg: >-
      freescout_database_type must be 'mysql' or 'postgres'
  when: "freescout_database_type not in ['mysql', 'postgres']"

- name: Fail if required FreeScout + MySQL integration settings not defined
  ansible.builtin.fail:
    msg: >-
      You need to define a required configuration setting (`{{ item }}`) when `freescout_database_type` is `mysql`
  when: "freescout_database_type == 'mysql' and lookup('vars', item, default='') | string | length == 0"
  with_items:
    - freescout_database_mysql_hostname
    - freescout_database_mysql_password

- name: Fail if required FreeScout + Postgres integration settings not defined
  ansible.builtin.fail:
    msg: >-
      You need to define a required configuration setting (`{{ item }}`) when `freescout_database_type` is `postgres`
  when: "freescout_database_type == 'postgres' and lookup('vars', item, default='') | string | length == 0"
  with_items:
    - freescout_database_postgres_hostname
    - freescout_database_postgres_password

- name: Run if Traefik is enabled
  when: freescout_container_labels_traefik_enabled | bool
  block:
    - name: Fail if Traefik settings required for FreeScout are not defined
      ansible.builtin.fail:
        msg: >-
          You need to define a required configuration setting (`{{ item }}`).
      when: "lookup('vars', item, default='') | string | length == 0"
      with_items:
        - freescout_container_labels_traefik_hostname
        - freescout_container_labels_traefik_path_prefix

    # We ensure it doesn't end with a slash, because we handle both (slash and no-slash).
    # Knowing that `freescout_container_labels_traefik_path_prefix` does not end with a slash
    # ensures we know how to set these routes up without having to do "does it end with a slash" checks elsewhere.
    - name: Fail if freescout_container_labels_traefik_path_prefix ends with a slash
      ansible.builtin.fail:
        msg: >-
          freescout_container_labels_traefik_path_prefix (`{{ freescout_container_labels_traefik_path_prefix }}`) must either be `/` or not end with a slash (e.g. `/freescout`).
      when: "freescout_container_labels_traefik_path_prefix != '/' and freescout_container_labels_traefik_path_prefix[-1] == '/'"
