---
- name: Ensure FreeScout paths exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0750"
    owner: "{{ freescout_uid }}"
    group: "{{ freescout_gid }}"
  with_items:
    - "{{ freescout_base_path }}"
    - "{{ freescout_data_path }}"
    - "{{ freescout_logs_path }}"
    - "{{ freescout_modules_path }}"

- name: Ensure FreeScout support files installed
  ansible.builtin.template:
    src: "{{ role_path }}/templates/{{ item }}.j2"
    dest: "{{ freescout_base_path }}/{{ item }}"
    mode: "0640"
    owner: "{{ freescout_uid }}"
    group: "{{ freescout_gid }}"
  with_items:
    - env
    - labels
  register: freescout_support_files_result

- name: Ensure FreeScout container image is pulled via community.docker.docker_image_pull
  when: devture_systemd_docker_base_container_image_pull_method == 'ansible-module'
  community.docker.docker_image_pull:
    name: "{{ freescout_container_image }}"
    pull: always
  register: freescout_container_image_pull_result_ansible_module
  retries: "{{ devture_playbook_help_container_retries_count }}"
  delay: "{{ devture_playbook_help_container_retries_delay }}"
  until: freescout_container_image_pull_result_ansible_module is not failed

- name: Ensure FreeScout container image is pulled via ansible.builtin.command
  when: devture_systemd_docker_base_container_image_pull_method == 'command'
  ansible.builtin.command:
    cmd: "{{ devture_systemd_docker_base_host_command_docker }} pull {{ freescout_container_image }}"
  register: freescout_container_image_pull_result_command
  retries: "{{ devture_playbook_help_container_retries_count }}"
  delay: "{{ devture_playbook_help_container_retries_delay }}"
  until: freescout_container_image_pull_result_command is not failed
  changed_when: "'Downloaded newer image' in freescout_container_image_pull_result_command.stdout"

- name: Ensure FreeScout container network is created via community.docker.docker_network
  when: devture_systemd_docker_base_container_network_creation_method == 'ansible-module'
  community.docker.docker_network:
    enable_ipv6: "{{ devture_systemd_docker_base_ipv6_enabled }}"
    name: "{{ freescout_container_network }}"
    driver: bridge
    driver_options: "{{ devture_systemd_docker_base_container_networks_driver_options }}"
  register: freescout_network_creation_result

- name: Ensure FreeScout container network is created via ansible.builtin.command
  when: devture_systemd_docker_base_container_network_creation_method == 'command'
  ansible.builtin.command:
    cmd: >-
      {{ devture_systemd_docker_base_host_command_docker }} network create
      {% if devture_systemd_docker_base_ipv6_enabled %}--ipv6{% endif %}
      {{ devture_systemd_docker_base_container_networks_driver_options_string }}
      {{ freescout_container_network }}
  register: freescout_network_creation_result
  changed_when: freescout_network_creation_result.rc == 0
  failed_when: freescout_network_creation_result.rc != 0 and 'already exists' not in freescout_network_creation_result.stderr

- name: Ensure FreeScout systemd service is present
  ansible.builtin.template:
    src: "{{ role_path }}/templates/systemd/freescout.service.j2"
    dest: "{{ devture_systemd_docker_base_systemd_path }}/{{ freescout_identifier }}.service"
    mode: "0644"
  register: freescout_systemd_service_result

- name: Determine whether FreeScout needs a restart
  ansible.builtin.set_fact:
    freescout_restart_necessary: >-
      {{
        freescout_support_files_result.changed | default(false)
        or freescout_systemd_service_result.changed | default(false)
        or freescout_container_image_pull_result_ansible_module.changed | default(false)
        or freescout_container_image_pull_result_command.changed | default(false)
      }}
